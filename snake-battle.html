<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Battle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --c1:   #1D9E75;
    --c1h:  #5DCAA5;
    --c1d:  #085041;
    --c2:   #D85A30;
    --c2h:  #F0997B;
    --c2d:  #993C1D;
    --bg:   #0b0c0f;
    --surface: #13151a;
    --border: rgba(255,255,255,0.07);
    --text:  #e8e6e0;
    --muted: #6b6a66;
  }

  html, body {
    width: 100%; min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    overflow-x: hidden;
  }

  /* Dot-grid background */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.055) 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
    z-index: 0;
  }

  /* Radial vignette */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse 80% 80% at 50% 50%, transparent 40%, rgba(11,12,15,0.85) 100%);
    pointer-events: none;
    z-index: 0;
  }

  .page {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem 3rem;
    gap: 0;
  }

  /* ── Header ── */
  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(2.4rem, 6vw, 4rem);
    letter-spacing: -0.02em;
    line-height: 1;
    display: flex;
    align-items: center;
    gap: 0.25em;
  }

  h1 .w1 { color: var(--c1h); }
  h1 .sep { color: var(--muted); font-weight: 400; font-size: 0.7em; }
  h1 .w2 { color: var(--c2h); }

  .subtitle {
    margin-top: 10px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  /* ── Score bar ── */
  .scorebar {
    display: flex;
    align-items: stretch;
    width: 560px;
    max-width: 100%;
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 10px 10px 0 0;
    overflow: hidden;
    background: var(--surface);
  }

  .score-cell {
    flex: 1;
    padding: 12px 24px;
    text-align: center;
  }

  .score-cell.mid {
    flex: 0 0 auto;
    padding: 12px 20px;
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
  }

  .score-label {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .score-val {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 700;
    line-height: 1;
  }

  /* ── Canvas wrap ── */
  .canvas-wrap {
    position: relative;
    width: 560px;
    max-width: 100%;
    border: 1px solid var(--border);
    border-radius: 0 0 10px 10px;
    overflow: hidden;
    /* Subtle ambient glow per snake color */
    box-shadow:
      -4px 0 40px rgba(29,158,117,0.08),
       4px 0 40px rgba(216,90,48,0.08),
       0  8px 60px rgba(0,0,0,0.6);
  }

  canvas { display: block; width: 100%; height: auto; }

  /* Overlay for idle/end state */
  #overlay {
    position: absolute; inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    background: rgba(11,12,15,0.82);
    backdrop-filter: blur(3px);
    transition: opacity 0.3s;
  }

  #overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .overlay-title {
    font-family: 'Syne', sans-serif;
    font-size: clamp(1.4rem, 4vw, 2rem);
    font-weight: 800;
    letter-spacing: -0.01em;
    text-align: center;
    line-height: 1.2;
  }

  .overlay-sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-align: center;
  }

  .btn-row {
    display: flex;
    gap: 12px;
    margin-top: 4px;
  }

  .btn {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 11px 28px;
    border-radius: 6px;
    cursor: pointer;
    border: 1px solid;
    transition: all 0.15s;
    outline: none;
  }

  .btn-primary {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }
  .btn-primary:hover { background: #fff; border-color: #fff; }
  .btn-primary:active { transform: scale(0.97); }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border-color: var(--border);
  }
  .btn-ghost:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
  .btn-ghost:active { transform: scale(0.97); }

  /* ── Status bar ── */
  .statusbar {
    width: 560px;
    max-width: 100%;
    margin-top: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  .legend {
    display: flex;
    gap: 16px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 2px;
  }

  /* Scanline overlay on canvas */
  .scanlines {
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(0,0,0,0.03) 3px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    border-radius: 0 0 10px 10px;
  }

  /* Responsive */
  @media (max-width: 600px) {
    .scorebar, .canvas-wrap, .statusbar { width: 100%; }
    h1 { font-size: 2rem; }
    .score-cell { padding: 10px 12px; }
    .score-val { font-size: 22px; }
  }
</style>
</head>
<body>
<div class="page">

  <header>
    <p class="eyebrow">Autonomous AI · Two-player battle</p>
    <h1><span class="w1">Snake</span><span class="sep">&nbsp;vs&nbsp;</span><span class="w2">Snake</span></h1>
    <p class="subtitle">BFS pathfinding · Flood-fill survival · 60 fps interpolation</p>
  </header>

  <!-- Score bar -->
  <div class="scorebar">
    <div class="score-cell">
      <div class="score-label" style="color:var(--c1h)">Teal</div>
      <div class="score-val" id="s1" style="color:var(--c1h)">0</div>
    </div>
    <div class="score-cell mid">
      <div class="score-label">Apples</div>
      <div class="score-val" id="applecount" style="color:var(--text)">—</div>
    </div>
    <div class="score-cell">
      <div class="score-label" style="color:var(--c2h)">Coral</div>
      <div class="score-val" id="s2" style="color:var(--c2h)">0</div>
    </div>
  </div>

  <!-- Canvas -->
  <div class="canvas-wrap">
    <canvas id="canvas" width="560" height="560"></canvas>
    <div class="scanlines"></div>

    <!-- Overlay -->
    <div id="overlay">
      <div>
        <div class="overlay-title" id="overlay-title">Snake vs Snake</div>
        <div class="overlay-sub" id="overlay-sub" style="margin-top:8px">Two AIs enter. One wins.</div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="mainBtn" onclick="handleMain()">Start Game</button>
      </div>
    </div>
  </div>

  <!-- Status -->
  <div class="statusbar">
    <div class="legend">
      <div class="legend-item">
        <div class="dot" style="background:var(--c1h)"></div>
        <span>Teal — BFS + flood fill</span>
      </div>
      <div class="legend-item">
        <div class="dot" style="background:var(--c2h)"></div>
        <span>Coral — BFS + flood fill</span>
      </div>
    </div>
    <span id="status-text">Ready</span>
  </div>

</div>

<script>
const COLS=28,ROWS=28,CS=20,TICK=115;
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');

const BG='#0b0c0f', CGRID='rgba(255,255,255,0.025)';
const C1H='#5DCAA5', C1='#1D9E75', C1D='#085041';
const C2H='#F0997B', C2='#D85A30', C2D='#993C1D';
const CA='#E24B4A',  CAS='#F09595';

let snakes=[], apples=[], running=false, rafId=null, lastTick=0, scores=[0,0];
let gameStarted=false;

const lerp=(a,b,t)=>a+(b-a)*t;
const lp=(p,c,t)=>({x:lerp(p.x,c.x,t),y:lerp(p.y,c.y,t)});
const ease=t=>t<.5?2*t*t:-1+(4-2*t)*t;
const key=(x,y)=>x*100+y;
const keyc=c=>key(c.x,c.y);

function initSnakes(){
  const mk=(body,dir,hi,col,dark,idx)=>({
    body:body.map(c=>({...c})),
    prevBody:body.map(c=>({...c})),
    dir, hi, color:col, dark, alive:true, idx
  });
  snakes=[
    mk([{x:4,y:14},{x:3,y:14},{x:2,y:14}],{x:1,y:0}, C1H,C1,C1D, 0),
    mk([{x:23,y:14},{x:24,y:14},{x:25,y:14}],{x:-1,y:0}, C2H,C2,C2D, 1)
  ];
}

function buildOcc(){
  const s=new Set();
  snakes.forEach(sn=>sn.body.forEach(c=>s.add(keyc(c))));
  return s;
}

function bfs(start,targets,occ){
  if(!targets.length)return null;
  const tset=new Set(targets.map(t=>keyc(t)));
  const q=[{x:start.x,y:start.y,path:[]}], vis=new Set([keyc(start)]);
  const dirs=[{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}];
  while(q.length){
    const{x,y,path}=q.shift();
    for(const d of dirs){
      const nx=x+d.x, ny=y+d.y, k=key(nx,ny);
      if(nx<0||nx>=COLS||ny<0||ny>=ROWS||vis.has(k)||occ.has(k))continue;
      const np=[...path,d];
      if(tset.has(k))return np;
      vis.add(k); q.push({x:nx,y:ny,path:np});
    }
  }
  return null;
}

function flood(start,occ){
  const q=[start], vis=new Set([keyc(start)]);
  const dirs=[{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}];
  let n=0;
  while(q.length){
    const{x,y}=q.shift(); n++;
    for(const d of dirs){
      const nx=x+d.x, ny=y+d.y, k=key(nx,ny);
      if(nx<0||nx>=COLS||ny<0||ny>=ROWS||vis.has(k)||occ.has(k))continue;
      vis.add(k); q.push({x:nx,y:ny});
    }
  }
  return n;
}

function bestDir(snake){
  const head=snake.body[0];
  const occ=buildOcc();
  occ.delete(keyc(snake.body[snake.body.length-1]));
  occ.delete(keyc(head));
  const path=bfs(head,apples,occ);
  if(path&&path.length)return path[0];
  const dirs=[{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}];
  const safe=dirs.filter(d=>!(d.x===-snake.dir.x&&d.y===-snake.dir.y));
  let bD=null,bS=-1;
  for(const d of safe){
    const nx=head.x+d.x, ny=head.y+d.y;
    if(nx<0||nx>=COLS||ny<0||ny>=ROWS)continue;
    if(occ.has(key(nx,ny)))continue;
    const tmp=new Set(occ); tmp.add(key(nx,ny));
    const sp=flood({x:nx,y:ny},tmp);
    if(sp>bS){bS=sp;bD=d;}
  }
  if(bD)return bD;
  for(const d of dirs){
    const nx=head.x+d.x, ny=head.y+d.y;
    if(nx<0||nx>=COLS||ny<0||ny>=ROWS)continue;
    if(!occ.has(key(nx,ny)))return d;
  }
  return snake.dir;
}

function spawnApple(){
  if(apples.length>=4)return;
  const occ=buildOcc();
  const as=new Set(apples.map(a=>keyc(a)));
  for(let t=0;t<300;t++){
    const x=Math.floor(Math.random()*COLS), y=Math.floor(Math.random()*ROWS);
    if(!occ.has(key(x,y))&&!as.has(key(x,y))){apples.push({x,y});return;}
  }
}

function tickGame(){
  const nd=snakes.map(s=>s.alive?bestDir(s):s.dir);
  snakes.forEach((s,i)=>{
    s.prevBody=s.body.map(c=>({...c}));
    if(!s.alive)return;
    s.dir=nd[i];
    const h=s.body[0], nh={x:h.x+s.dir.x, y:h.y+s.dir.y};
    if(nh.x<0||nh.x>=COLS||nh.y<0||nh.y>=ROWS){s.alive=false;return;}
    if(s.body.some(b=>b.x===nh.x&&b.y===nh.y)){s.alive=false;return;}
    s.body.unshift(nh);
    const ai=apples.findIndex(a=>a.x===nh.x&&a.y===nh.y);
    if(ai>=0){
      apples.splice(ai,1); scores[i]++;
      document.getElementById('s'+(i+1)).textContent=scores[i];
      spawnApple();
    } else s.body.pop();
  });

  const[s0,s1]=snakes;
  if(s0.alive&&s1.alive){
    const h0=s0.body[0], h1=s1.body[0];
    if(h0.x===h1.x&&h0.y===h1.y){s0.alive=false;s1.alive=false;}
    if(s1.body.slice(1).some(b=>b.x===h0.x&&b.y===h0.y))s0.alive=false;
    if(s0.body.slice(1).some(b=>b.x===h1.x&&b.y===h1.y))s1.alive=false;
  }
  document.getElementById('applecount').textContent=apples.length;

  if(snakes.filter(s=>s.alive).length<2){
    running=false;
    let title='Draw', sub='Both snakes crashed simultaneously.';
    if(s0.alive&&!s1.alive){title='Teal Wins!'; sub='Coral ran out of road.';}
    else if(!s0.alive&&s1.alive){title='Coral Wins!'; sub='Teal ran out of road.';}
    showOverlay(title, sub, 'Play Again');
    document.getElementById('status-text').textContent='Round over';
  }
}

function drawRR(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function drawFrame(t){
  const et=ease(t);
  ctx.fillStyle=BG; ctx.fillRect(0,0,canvas.width,canvas.height);

  // Grid
  ctx.strokeStyle=CGRID; ctx.lineWidth=.5;
  for(let i=0;i<=COLS;i++){
    ctx.beginPath(); ctx.moveTo(i*CS,0); ctx.lineTo(i*CS,ROWS*CS); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,i*CS); ctx.lineTo(COLS*CS,i*CS); ctx.stroke();
  }

  // Apples
  apples.forEach(a=>{
    const px=a.x*CS+CS/2, py=a.y*CS+CS/2, r=CS/2-2;
    ctx.fillStyle=CA; ctx.beginPath(); ctx.arc(px,py,r,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=CAS; ctx.beginPath(); ctx.arc(px-r*.28,py-r*.28,r*.32,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#085041'; ctx.fillRect(px-.5,py-r-3,1,4);
    ctx.fillStyle='#5DCAA5'; ctx.fillRect(px,py-r-3,3,2);
  });

  // Snakes
  snakes.forEach(sn=>{
    const n=sn.body.length;
    const baseAlpha=sn.alive?1:.22;
    for(let i=n-1;i>=0;i--){
      const curr=sn.body[i], prev=sn.prevBody[i]||curr;
      const pos=lp(prev,curr,et);
      const isHead=i===0;
      const segAlpha=baseAlpha*(1-(i/n)*.55);
      const pad=1.5;
      ctx.globalAlpha=segAlpha;
      ctx.fillStyle=isHead?sn.hi:sn.color;
      drawRR(pos.x*CS+pad, pos.y*CS+pad, CS-pad*2, CS-pad*2, isHead?5:3);
      ctx.fill();
      if(isHead&&sn.alive){
        ctx.globalAlpha=baseAlpha;
        const cx=pos.x*CS+CS/2, cy=pos.y*CS+CS/2;
        const dx=sn.dir.x, dy=sn.dir.y;
        const px2=-dy*3.5, py2=dx*3.5;
        [[cx+dx*3+px2,cy+dy*3+py2],[cx+dx*3-px2,cy+dy*3-py2]].forEach(([ex,ey])=>{
          ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(ex,ey,2.3,0,Math.PI*2); ctx.fill();
          ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(ex+dx*.8,ey+dy*.8,1.1,0,Math.PI*2); ctx.fill();
        });
      }
    }
    ctx.globalAlpha=1;
  });
}

function loop(now){
  if(now-lastTick>=TICK){
    tickGame();
    lastTick=now;
  }
  const t=Math.min(1,(now-lastTick)/TICK);
  drawFrame(t);
  if(running) rafId=requestAnimationFrame(loop);
  else drawFrame(1);
}

function showOverlay(title, sub, btnLabel){
  document.getElementById('overlay-title').textContent=title;
  document.getElementById('overlay-sub').textContent=sub;
  document.getElementById('mainBtn').textContent=btnLabel;
  document.getElementById('overlay').classList.remove('hidden');
}

function hideOverlay(){
  document.getElementById('overlay').classList.add('hidden');
}

function handleMain(){
  startGame();
}

function startGame(){
  cancelAnimationFrame(rafId);
  scores=[0,0];
  document.getElementById('s1').textContent='0';
  document.getElementById('s2').textContent='0';
  document.getElementById('status-text').textContent='In progress';
  apples=[]; initSnakes();
  for(let i=0;i<3;i++) spawnApple();
  document.getElementById('applecount').textContent=apples.length;
  hideOverlay();
  running=true; gameStarted=true; lastTick=performance.now();
  rafId=requestAnimationFrame(loop);
}

// Initial idle draw
drawFrame(0);
</script>
</body>
</html>
